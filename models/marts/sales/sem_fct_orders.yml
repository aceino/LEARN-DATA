semantic_models:
  - name: orders
    description: "Order fact table. One row per order."
    model: ref('fct_orders')
    defaults:
      agg_time_dimension: ordered_at

    entities:
      - name: order_id
        type: primary
      - name: account
        type: foreign
        expr: account_id
      - name: sales_rep
        type: foreign
        expr: sales_rep_id
      - name: region
        type: foreign
        expr: region_id

    dimensions:
      - name: ordered_at
        type: time
        expr: date_trunc('day', ordered_at)
        type_params:
          time_granularity: day
      - name: region_name
        type: categorical
      - name: sales_rep_name
        type: categorical
      - name: is_large_order
        type: categorical
        expr: case when total_amt_usd > 1000 then true else false end

    measures:
      - name: total_revenue
        description: "Total revenue across all paper types"
        agg: sum
        expr: total_amt_usd
      - name: order_count
        description: "Count of individual orders"
        agg: sum
        expr: 1
      - name: standard_revenue
        description: "Revenue from standard paper"
        agg: sum
        expr: standard_amt_usd
      - name: gloss_revenue
        description: "Revenue from gloss paper"
        agg: sum
        expr: gloss_amt_usd
      - name: poster_revenue
        description: "Revenue from poster paper"
        agg: sum
        expr: poster_amt_usd
      - name: avg_order_value
        description: "Average order value in USD"
        agg: average
        expr: total_amt_usd